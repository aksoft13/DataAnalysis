<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mac 실행 방법</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #4f46e5;
  --primary-light: #e0e7ff;
  --text: #1e293b;
  --text-light: #64748b;
  --border: #e2e8f0;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Noto Sans KR', -apple-system, sans-serif; background: #fff; color: var(--text); font-size: 15px; line-height: 1.85; padding: 40px 20px; }
.container { max-width: 560px; margin: 0 auto; }

/* 헤더 */
.header { text-align: center; margin-bottom: 32px; }
.header h1 { font-size: 24px; font-weight: 900; color: var(--text); margin-bottom: 4px; }
.header .subtitle { font-size: 14px; color: var(--text-light); font-weight: 400; }

/* 카드 */
.card { background: #fff; border: 1px solid var(--border); border-radius: 10px; padding: 28px; }

/* 버튼 */
.btn-wrap { text-align: center; margin-bottom: 24px; }
.btn { display: inline-block; background: var(--primary); color: #fff; font-family: 'Noto Sans KR', sans-serif; font-size: 16px; font-weight: 600; padding: 13px 36px; border-radius: 8px; border: none; cursor: pointer; transition: background 0.2s, transform 0.1s; letter-spacing: -0.2px; }
.btn:hover { background: #4338ca; }
.btn:active { background: #3730a3; transform: scale(0.98); }

/* 스텝 */
.steps { font-size: 14px; color: var(--text); padding-left: 20px; }
.steps li { margin-bottom: 8px; line-height: 1.7; }
.steps strong { color: var(--primary); font-weight: 600; }
.steps code { font-family: 'JetBrains Mono', monospace; font-size: 12px; background: var(--primary-light); color: var(--primary); padding: 2px 7px; border-radius: 4px; }

/* 노트 */
.note { background: #fffbeb; border: 1px solid #fbbf24; border-radius: 8px; padding: 12px 16px; font-size: 13px; color: #92400e; margin-top: 20px; line-height: 1.65; }

/* 토스트 */
.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--text); color: #fff; padding: 12px 24px; border-radius: 8px; font-size: 13px; font-weight: 500; opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 999; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="container">

<div class="header">
  <h1>Mac 실행 방법</h1>
  <p class="subtitle">최초 1회만 이 과정이 필요합니다</p>
</div>

<div class="card">
  <div class="btn-wrap">
    <button class="btn" onclick="copyAndGuide()">명령어 복사</button>
  </div>

  <ol class="steps">
    <li>위 버튼 클릭 → <strong>명령어가 클립보드에 복사</strong>됩니다</li>
    <li><strong>터미널</strong> 열기 (<code>Cmd+Space</code> → "터미널" 입력)</li>
    <li>터미널에서 <code>Cmd+V</code> 붙여넣기 후 <code>Enter</code></li>
    <li>다음부터는 <code>start-mac.command</code> 더블클릭으로 실행</li>
  </ol>

  <div class="note">
    Python 3.8 이상과 kiwipiepy가 필요합니다. 미설치 시 앱에서 안내가 나옵니다.
  </div>
</div>

</div>

<div class="toast" id="toast">복사 완료! 터미널에서 Cmd+V 붙여넣기</div>

<script>
function copyAndGuide() {
  var folderPath = decodeURIComponent(window.location.pathname);
  folderPath = folderPath.substring(0, folderPath.lastIndexOf('/'));

  var cmd = "cd '" + folderPath + "' && xattr -cr . && chmod +x start-mac.command && bash start-mac.command";

  navigator.clipboard.writeText(cmd).then(function() {
    showToast();
  }).catch(function() {
    var ta = document.createElement('textarea');
    ta.value = cmd;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast();
  });
}

function showToast() {
  var toast = document.getElementById('toast');
  toast.classList.add('show');
  setTimeout(function() { toast.classList.remove('show'); }, 3000);
}
</script>
</body>
</html>
